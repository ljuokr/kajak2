    ctx.moveTo(player.x, kayakY - player.h / 2 - 8);
    ctx.lineTo(player.x, kayakY - 20);
    ctx.moveTo(player.x, kayakY - 4);
    ctx.lineTo(player.x, kayakY + 4);
    ctx.moveTo(player.x, kayakY + 20);
    ctx.lineTo(player.x, kayakY + player.h / 2 + 8);
    ctx.stroke();

    ctx.globalAlpha = 1.0;
    drawPaddler(0, player.paddlePhase, player.paddleAmp, false, -15);
    drawPaddler(0, player.paddlePhase, player.paddleAmp, true, 15);
  } else {
    ctx.save();
    ctx.translate(player.x, kayakY);
    ctx.rotate(Math.PI / 4);
    const grad = ctx.createLinearGradient(-player.w / 2, 0, player.w / 2, 0);
    grad.addColorStop(0, '#7a1a00');
    grad.addColorStop(0.5, '#CC3300');
    grad.addColorStop(1, '#8a2200');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(0, -player.h / 2 - 10);
    ctx.quadraticCurveTo(player.w / 2 + 5, -player.h / 4, player.w / 2, 0);
    ctx.quadraticCurveTo(player.w / 2 + 5, player.h / 4, 0, player.h / 2 + 10);
    ctx.quadraticCurveTo(-player.w / 2 - 5, player.h / 4, -player.w / 2, 0);
    ctx.quadraticCurveTo(-player.w / 2 - 5, -player.h / 4, 0, -player.h / 2 - 10);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#3a0a00';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
    drawCapsizedPerson(player.x - 35, kayakY, false);
    drawCapsizedPerson(player.x + 35, kayakY, true);
  }
}

/* ---------- Strand-Szene bei Game Over ---------- */
function drawBeachScene(kayakY) {
  const side = player.beachSide || 'L';
  const strandDx = side === 'L' ? -8 : 8;

  // Personen + Feuer: fest am Welt-Ufer verankert (Position zur Game-Over-Zeit).
  const anchorX = (player.beachAnchorX != null) ? player.beachAnchorX : player.x;
  const anchorY = (player.beachAnchorY != null) ? player.beachAnchorY : player.y;
  const shoreCX = anchorX + strandDx;
  const shoreCY = (anchorY - camY) + 5;
  const dir = side === 'L' ? -1 : 1;

  // Spread in Flussrichtung, je Person eigene Shore-X anhand der Uferkante
  // an ihrer eigenen y-Position — garantiert, dass keine Figur im Wasser landet.
  const spread = 48;
  const inland = 18;   // wie weit von der Wasserkante weg ins Land
  const edgeMargin = 26;

  // Funktion: Shore-X am gegebenen Welt-y für die gewählte Seite, clampt auf Screen.
  const shoreXAt = wy => {
    const [wL, wR] = waterEdges(wy);
    const x = side === 'L' ? wL - inland : wR + inland;
    return Math.max(edgeMargin, Math.min(WIDTH - edgeMargin, x));
  };

  // Person 1 (dunkelhaarig) — oberhalb des Feuers (flussaufwärts)
  const p1WorldY = anchorY - spread;
  const person1X = shoreXAt(p1WorldY);
  const person1Y = p1WorldY - camY;
  // Feuer in der Mitte
  const fireX = shoreXAt(anchorY);
  const fireY = shoreCY;
  // Person 2 (blond) — unterhalb des Feuers (flussabwärts)
  const p2WorldY = anchorY + spread;
  const person2X = shoreXAt(p2WorldY);
  const person2Y = p2WorldY - camY;

  // Feuer zeichnen
  ctx.save();
  ctx.translate(fireX, fireY);
  ctx.scale(2.6, 2.6);
  drawBeachFire(0, 0);
  ctx.restore();

  // Person 1
  ctx.save();
  ctx.translate(person1X, person1Y);
  ctx.scale(2.2, 2.2);
  drawSittingPerson(0, 0, false, dir);
  ctx.restore();

  // Person 2
  ctx.save();
  ctx.translate(person2X, person2Y);
  ctx.scale(2.2, 2.2);
  drawSittingPerson(0, 0, true, dir);
  ctx.restore();

  // ---- Kajak (treibt wie ein Baumstamm, KEIN Schatten) ----
  const kayakCX = player.x;
  const kayakCY = player.y - camY;
  const baseAngle = side === 'L' ? -Math.PI / 2.4 : Math.PI / 2.4;
  const kayakAngle = baseAngle + (player.gameOverRot || 0);

  ctx.save();
  ctx.translate(kayakCX, kayakCY);
  ctx.rotate(kayakAngle);

  const grad = ctx.createLinearGradient(-player.w / 2, 0, player.w / 2, 0);
  grad.addColorStop(0, '#7a1a00');
  grad.addColorStop(0.5, '#CC3300');
  grad.addColorStop(1, '#FF5A1F');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(0, -player.h / 2 - 10);
  ctx.quadraticCurveTo(player.w / 2 + 5, -player.h / 4, player.w / 2, 0);
  ctx.quadraticCurveTo(player.w / 2 + 5, player.h / 4, 0, player.h / 2 + 10);
  ctx.quadraticCurveTo(-player.w / 2 - 5, player.h / 4, -player.w / 2, 0);
  ctx.quadraticCurveTo(-player.w / 2 - 5, -player.h / 4, 0, -player.h / 2 - 10);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#5a1200';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(0, -12, 7, 9, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, 12, 7, 9, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // ---- Paddel (eigenständiger "Baumstamm", eigene Position + Rotation) ----
  if (player.paddleY != null) {
    const paddleCX = player.paddleX;
    const paddleCY = player.paddleY - camY;
    ctx.save();
    ctx.translate(paddleCX, paddleCY);
    ctx.rotate(player.paddleRot || 0);
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-30, 0); ctx.lineTo(30, 0);
    ctx.stroke();
    ctx.fillStyle = '#1a1a1a';
    ctx.save();
    ctx.translate(-30, 0);
    ctx.beginPath();
    ctx.ellipse(-6, 0, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.translate(30, 0);
    ctx.beginPath();
    ctx.ellipse(6, 0, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.restore();
  }
}

function drawSittingPerson(x, y, isBlond, facingDir) {
  // facingDir: -1 = Personen schauen nach rechts (Richtung Wasser), +1 = nach links
  const faceDir = -facingDir;
  ctx.save();

  // Körper (sitzend, angezogene Beine)
  // Beine
  ctx.fillStyle = '#2a4a7a'; // Badehose/Shorts
  ctx.beginPath();
  ctx.ellipse(x + faceDir * 6, y + 12, 10, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Oberkörper schräg zurückgelehnt
  ctx.fillStyle = isBlond ? '#ffb84a' : '#c44a1a';
  ctx.save();
  ctx.translate(x, y + 2);
  ctx.rotate(faceDir * -0.15);
  ctx.beginPath();
  ctx.ellipse(0, 0, 6, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Arm mit Bier
  ctx.strokeStyle = isBlond ? '#f5c080' : '#8b5a3c';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x, y - 2);
  ctx.lineTo(x + faceDir * 8, y - 8);
  ctx.stroke();

  // Bierflasche in der Hand
  const bottleX = x + faceDir * 8;
  const bottleY = y - 14;
  // Flaschenkörper
  ctx.fillStyle = '#3a5a2a';
  ctx.fillRect(bottleX - 2.5, bottleY, 5, 10);
  // Flaschenhals
  ctx.fillRect(bottleX - 1.5, bottleY - 4, 3, 5);
  // Etikett
  ctx.fillStyle = '#f5d070';
  ctx.fillRect(bottleX - 2.2, bottleY + 3, 4.4, 3);
  // Glanz
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillRect(bottleX - 2, bottleY + 1, 1, 8);

  // Kopf
  ctx.fillStyle = '#f5c080';
  ctx.beginPath();
  ctx.arc(x, y - 10, 5, 0, Math.PI * 2);
  ctx.fill();
  // Haare
  ctx.fillStyle = isBlond ? '#FFD700' : '#2a2a2a';
  ctx.beginPath();
  ctx.arc(x, y - 11, 5, Math.PI, 2 * Math.PI);
  ctx.fill();
  ctx.restore();
}

function drawBeachFire(x, y) {
  // Steinkranz
  ctx.fillStyle = '#5a5a5a';
  for (let i = 0; i < 5; i++) {
    const ang = (i / 5) * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(x + Math.cos(ang) * 8, y + Math.sin(ang) * 3, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
  // Holzscheite
  ctx.strokeStyle = '#4a3020';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - 5, y + 1); ctx.lineTo(x + 5, y - 1);
  ctx.moveTo(x - 4, y - 2); ctx.lineTo(x + 4, y + 2);
  ctx.stroke();
  // Flamme (animiert)
  const flicker = Math.sin(tick * 0.3) * 2 + Math.sin(tick * 0.5) * 1;
  ctx.fillStyle = '#ff8c1a';
  ctx.beginPath();
  ctx.moveTo(x, y - 10 - flicker);
  ctx.quadraticCurveTo(x + 4, y - 2, x, y);
  ctx.quadraticCurveTo(x - 4, y - 2, x, y - 10 - flicker);
  ctx.fill();
  ctx.fillStyle = '#ffd74a';
  ctx.beginPath();
  ctx.moveTo(x, y - 7 - flicker * 0.5);
  ctx.quadraticCurveTo(x + 2, y - 1, x, y);
  ctx.quadraticCurveTo(x - 2, y - 1, x, y - 7 - flicker * 0.5);
  ctx.fill();
}

function drawSplashes() {
  splashes.forEach(s => {
    const alpha = s.life / s.maxLife;
    const y = s.y - camY;
    if (s.kind === 'ring') {
      ctx.save();
      ctx.strokeStyle = `rgba(220, 240, 255, ${alpha * 0.7})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(s.x, y, s.r * 1.3, s.r * 0.5, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    } else if (s.kind === 'foam') {
      ctx.fillStyle = `rgba(240, 250, 255, ${alpha * 0.85})`;
      ctx.beginPath();
      ctx.arc(s.x, y, s.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x - s.r * 0.3, y - s.r * 0.3, s.r * 0.5, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = `rgba(180, 220, 250, ${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, y, s.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.8})`;
      ctx.beginPath();
      ctx.arc(s.x - s.r * 0.3, y - s.r * 0.3, s.r * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

function drawScorePops() {
  scorePops.forEach(p => {
    const age = tick - p.t;
    const alpha = 1 - age / 60;
    const y = p.y - camY - age * 0.8;
    // Zeichenkette: numerisch bekommt '+', negativ/string (z.B. "-10", "Leben") direkt.
    const label = typeof p.pts === 'number'
      ? (p.pts >= 0 ? '+' + p.pts : String(p.pts))
      : (String(p.pts).startsWith('-') ? String(p.pts) : '+' + p.pts);
    const isPenalty = typeof p.pts === 'string' && p.pts.startsWith('-');
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = isPenalty ? '#ff5a1a' : '#FFD700';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.font = 'bold 22px Arial';
    ctx.textAlign = 'center';
    ctx.strokeText(label, p.x, y);
    ctx.fillText(label, p.x, y);
    ctx.restore();
  });
  ctx.textAlign = 'left';
}

function drawHUD() {
  // Paddel-Lebensanzeige: schwarze Paddel, gut sichtbar, 3 feste Slots.
  const MAX_LIVES = 3;
  for (let i = 0; i < MAX_LIVES; i++) {
    // Lives nach rechts geschoben, damit oben links Platz für den Sound-Button ist.
    const x = 94 + i * 62;
    const y = 36;
    const active = i < lives;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(-Math.PI / 6);
    ctx.globalAlpha = active ? 1.0 : 0.22;

    // Stab
    ctx.fillStyle = '#111';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.roundRect(-24, -2.5, 48, 5, 2);
    ctx.fill(); ctx.stroke();

    // Blätter (links + rechts, schwarz, mit dezenter Kontur-Highlight)
    ctx.fillStyle = '#000';
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-24, -6);
    ctx.quadraticCurveTo(-38, -7, -38, 0);
    ctx.quadraticCurveTo(-38, 7, -24, 6);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(24, -6);
    ctx.quadraticCurveTo(38, -7, 38, 0);
    ctx.quadraticCurveTo(38, 7, 24, 6);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Kontrast-Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.ellipse(-31, -2, 3, 1.4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(31, -2, 3, 1.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Griff-Wicklungen
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 0.9;
    ctx.beginPath();
    ctx.moveTo(-18, -2.5); ctx.lineTo(-18, 2.5);
    ctx.moveTo(-15, -2.5); ctx.lineTo(-15, 2.5);
    ctx.moveTo(15, -2.5); ctx.lineTo(15, 2.5);
    ctx.moveTo(18, -2.5); ctx.lineTo(18, 2.5);
    ctx.stroke();

    ctx.globalAlpha = 1.0;
    ctx.restore();
  }

  // Punkte & Distanz: bei GameOver im oberen Banner highlighten, sonst normale Anzeige.
  if (!gameOver) {
    ctx.fillStyle = '#000';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'right';
    ctx.fillText('Punkte: ' + score, WIDTH - 20, 40);
    ctx.font = 'bold 14px Arial';
    ctx.fillText('Distanz: ' + Math.floor(distance), WIDTH - 20, 60);

    // Level-Plakette oben rechts — Farbe entspricht der Strömungsstärke (4 Stufen).
    const level = score < 100 ? 1 : score < 200 ? 2 : score < 300 ? 3 : 4;
    const levelCol = level === 1 ? '#3a7a3a'     // grün: ruhig
                   : level === 2 ? '#2e5f8a'     // blau: normal
                   : level === 3 ? '#c44a1a'     // orange: stark
                   :               '#6a1a3a';    // dunkelrot: sehr stark
    ctx.save();
    ctx.fillStyle = levelCol;
    ctx.fillRect(WIDTH - 100, 72, 80, 24);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.2;
    ctx.strokeRect(WIDTH - 100, 72, 80, 24);
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 14px Arial';
    ctx.textBaseline = 'middle';
    ctx.fillText('Level ' + level, WIDTH - 60, 84);
    ctx.restore();
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  }

  // Ton-Button als Lautsprecher-Icon oben links (Taste M weiterhin aktiv).
  // Beim Start stumm — erster Tap entsperrt Audio und schaltet gleichzeitig an.
  ctx.save();
  const btnX = 8, btnY = 8, btnW = 44, btnH = 36;
  // Pulsierender Ring, solange stumm, damit der Button als Start-Knopf auffällt.
  if (soundMuted) {
    const pulse = 0.5 + 0.5 * Math.sin(tick * 0.12);
    ctx.strokeStyle = `rgba(255, 220, 80, ${0.35 + 0.5 * pulse})`;
    ctx.lineWidth = 3 + 2 * pulse;
    ctx.beginPath();
    const pr = 10;
    const pX = btnX - 5, pY = btnY - 5, pW = btnW + 10, pH = btnH + 10;
    ctx.moveTo(pX + pr, pY);
    ctx.lineTo(pX + pW - pr, pY);
    ctx.quadraticCurveTo(pX + pW, pY, pX + pW, pY + pr);
    ctx.lineTo(pX + pW, pY + pH - pr);
    ctx.quadraticCurveTo(pX + pW, pY + pH, pX + pW - pr, pY + pH);
    ctx.lineTo(pX + pr, pY + pH);
    ctx.quadraticCurveTo(pX, pY + pH, pX, pY + pH - pr);
    ctx.lineTo(pX, pY + pr);
    ctx.quadraticCurveTo(pX, pY, pX + pr, pY);
    ctx.closePath();
    ctx.stroke();
  }
  // Knopf-Hintergrund
  ctx.fillStyle = soundMuted ? 'rgba(196, 74, 26, 0.92)' : 'rgba(46, 95, 138, 0.92)';
  ctx.beginPath();
  const r = 6;
  ctx.moveTo(btnX + r, btnY);
  ctx.lineTo(btnX + btnW - r, btnY);
  ctx.quadraticCurveTo(btnX + btnW, btnY, btnX + btnW, btnY + r);
  ctx.lineTo(btnX + btnW, btnY + btnH - r);
  ctx.quadraticCurveTo(btnX + btnW, btnY + btnH, btnX + btnW - r, btnY + btnH);
  ctx.lineTo(btnX + r, btnY + btnH);
  ctx.quadraticCurveTo(btnX, btnY + btnH, btnX, btnY + btnH - r);
  ctx.lineTo(btnX, btnY + r);
  ctx.quadraticCurveTo(btnX, btnY, btnX + r, btnY);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Lautsprecher-Icon: Box + Kegel
  const cX = btnX + btnW / 2;
  const cY = btnY + btnH / 2;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  // Speaker-Box (Quadrat links) + Kegel (Trapez rechts)
  ctx.moveTo(cX - 10, cY - 4);
  ctx.lineTo(cX - 4, cY - 4);
  ctx.lineTo(cX + 4, cY - 10);
  ctx.lineTo(cX + 4, cY + 10);
  ctx.lineTo(cX - 4, cY + 4);
  ctx.lineTo(cX - 10, cY + 4);
  ctx.closePath();
  ctx.fill();

  if (soundMuted) {
    // Roter Schrägstrich durch den Lautsprecher
    ctx.strokeStyle = '#ff3030';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cX - 12, cY - 12);
    ctx.lineTo(cX + 12, cY + 12);
    ctx.stroke();
  } else {
    // Schallwellen
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(cX + 6, cY, 4, -Math.PI / 4, Math.PI / 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cX + 6, cY, 8, -Math.PI / 4, Math.PI / 4);
    ctx.stroke();
  }
  ctx.restore();

  // Geheimzahlen aus dem Original: bei 100 / 200 / 300 Punkten erscheinen
  // 3, 2, 4 als goldene Ziffern oben mittig (links vom Level-Badge).
  ctx.save();
  ctx.font = 'bold 24px Arial';
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 3;
  ctx.shadowOffsetX = 1.5;
  ctx.shadowOffsetY = 1.5;
  const secretY = 84;
  const secretX = WIDTH / 2 - 32;
  // Fanfare, sobald eine Schwelle (100 / 200 / 300) neu erreicht wird.
  const reached = (score >= 300) ? 3 : (score >= 200) ? 2 : (score >= 100) ? 1 : 0;
  if (reached > secretsRevealed) {
    secretsRevealed = reached;
    playFanfare();
  }
  if (score >= 100) ctx.fillText('3', secretX,      secretY);
  if (score >= 200) ctx.fillText('2', secretX + 32, secretY);
  if (score >= 300) ctx.fillText('4', secretX + 64, secretY);
  ctx.restore();

  ctx.textAlign = 'left';

  if (gameOver) {
    // Banner ganz oben: GAME OVER + Punkte & Distanz highlighted.
    ctx.save();
    ctx.fillStyle = 'rgba(0, 0, 0, 0.72)';
    ctx.fillRect(0, 0, WIDTH, 82);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.font = '900 30px "Arial Black", Impact, sans-serif';
    ctx.fillText('GAME OVER', WIDTH / 2, 34);
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 18px Arial';
    ctx.fillText('Punkte: ' + score + '   •   Distanz: ' + Math.floor(distance), WIDTH / 2, 64);
    ctx.restore();

    // Hinweis unten (Neustart)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, HEIGHT - 34, WIDTH, 34);
    ctx.fillStyle = '#FFF';
    ctx.font = '13px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Klick oder Tipp für Neustart', WIDTH / 2, HEIGHT - 12);
    ctx.textAlign = 'left';
  }

  // Start-Hinweis: weist auf den Sound-Button oben links hin, solange stumm.
  // Web Audio ist auf iOS zusätzlich an den Ringer-Switch gekoppelt.
  if (soundMuted) {
    ctx.save();
    const msg = 'Sound oben einschalten (Klingelton an!)';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const tw = ctx.measureText(msg).width;
    const boxW = tw + 32;
    const boxH = 40;
    const bx = WIDTH / 2 - boxW / 2;
    const by = 170;
    const pulse = 0.5 + 0.5 * Math.sin(tick * 0.09);
    ctx.fillStyle = `rgba(255, 220, 80, ${0.82 + 0.12 * pulse})`;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(bx, by, boxW, boxH, 12);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#000';
    ctx.fillText(msg, WIDTH / 2, by + boxH / 2 + 1);
    ctx.restore();
  }
}

function drawWater() {
  // Glatte Wasser-Silhouette als geschlossenes Polygon, 1-Pixel-Abtastung.
  ctx.save();
  ctx.beginPath();
  for (let y = 0; y <= HEIGHT; y += 1) {
    const [L] = waterEdges(y + camY);
    if (y === 0) ctx.moveTo(L, y);
    else ctx.lineTo(L, y);
  }
  for (let y = HEIGHT; y >= 0; y -= 1) {
    const [, R] = waterEdges(y + camY);
    ctx.lineTo(R, y);
  }
  ctx.closePath();
  ctx.clip();

  // Ein einziger vertikaler Gradient. Die Zonenfarbe wird stetig aus dem
  // flowMultiplier interpoliert — keine harten Schwellen, daher kein Banding.
  // Zonenfarben bewusst stärker voneinander getrennt: ruhig = helles Türkis,
  // normal = klares Blau, Stromschnelle = dunkles, kühles Graublau.
  const CALM   = [110, 185, 195];
  const NORMAL = [ 50, 115, 210];
  const RAPID  = [ 30,  60,  95];
  const mix = (a, b, k) => [
    a[0] + (b[0] - a[0]) * k,
    a[1] + (b[1] - a[1]) * k,
    a[2] + (b[2] - a[2]) * k
  ];
  const zoneColor = (m) => {
    if (m <= 1.0) {
      const k = Math.max(0, Math.min(1, (m - 0.4) / 0.6));
      return mix(CALM, NORMAL, k);
    }
    const k = Math.max(0, Math.min(1, (m - 1.0) / 0.6));
    return mix(NORMAL, RAPID, k);
  };

  // Gradient ausschliesslich aus der Zonenfarbe — kein Screen-space-Darkening mehr,
  // damit die Wasserdarstellung unabhängig von der Bewegungsrichtung wirkt.
  const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
  const steps = 16;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const worldY = t * HEIGHT + camY;
    // Effektive Zone berücksichtigt die Level-Stufe, damit im schnellen Level
    // sogar die ruhigen Abschnitte dunkler/turbulenter wirken — Optik passt zum Tempo.
    const m = flowMultiplier(worldY) * difficulty;
    const col = zoneColor(m);
    grad.addColorStop(t, `rgb(${Math.round(col[0])},${Math.round(col[1])},${Math.round(col[2])})`);
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  const highlight = ctx.createLinearGradient(0, 0, 0, HEIGHT * 0.25);
  highlight.addColorStop(0, 'rgba(255,255,255,0.08)');
  highlight.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = highlight;
  ctx.fillRect(0, 0, WIDTH, HEIGHT * 0.25);

  ctx.restore();
}

function drawWaves() {
  // Clip entlang der Wasserkante, 1-Pixel-Abtastung.
  ctx.save();
  ctx.beginPath();
  for (let y = 0; y <= HEIGHT; y += 1) {
    const [L] = waterEdges(y + camY);
    if (y === 0) ctx.moveTo(L, y);
    else ctx.lineTo(L, y);
  }
  for (let y = HEIGHT; y >= 0; y -= 1) {
    const [, R] = waterEdges(y + camY);
    ctx.lineTo(R, y);
  }
  ctx.closePath();
  ctx.clip();

  // Wellen an WELT-Y verankert, damit sie bei Bewegung sauber mitscrollen
  // und das Bild der Strömung nicht zwischen Vor-/Rückfahrt wechselt.
  const rowStep = 15;
  const rowStart = Math.floor(camY / rowStep) * rowStep;
  for (let wy = rowStart - rowStep; wy < camY + HEIGHT + rowStep; wy += rowStep) {
    const y = wy - camY;
    if (y < -rowStep || y > HEIGHT + rowStep) continue;
    const [L, R] = waterEdges(wy);
    // Optik = Zone × Level-Tempo, damit Wellenintensität zur Geschwindigkeit passt.
    const m = flowMultiplier(wy) * difficulty;

    // Wellenlinien: stärker + heller in Stromschnellen. Phase aus WELT-Koordinaten.
    if (m > 0.5) {
      ctx.lineWidth = 0.7 + m * 0.6;
      const alpha = Math.min(0.75, 0.12 + (m - 0.5) * 0.55);
      ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
      const waveOffset = Math.sin(tick * 0.02 * m + wy * 0.1) * 5 * m;
      ctx.beginPath();
      ctx.moveTo(L + 3, y);
      for (let x = L + 3; x <= R - 3; x += 10) {
        const waveY = y + Math.sin(x * 0.05 + tick * 0.03 * m) * 4 * m;
        const safeX = Math.max(L + 3, Math.min(R - 3, x + waveOffset));
        ctx.lineTo(safeX, waveY);
      }
      ctx.stroke();
    }

    // Schaum in Stromschnellen — Positionen aus wy, damit sie world-anchored scrollen.
    if (m > 1.2) {
      const density = Math.floor((m - 1.1) * 24);
      for (let i = 0; i < density; i++) {
        const span = Math.max(1, R - L - 10);
        const fx = L + 5 + Math.abs(Math.sin(wy * 0.31 + i * 7.3)) * span;
        const fy = y + ((wy * 5 + i * 13) % rowStep);
        const alpha = 0.55 + Math.sin(tick * 0.1 + i + wy * 0.05) * 0.35;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(fx, fy, 2.2 + Math.sin(tick * 0.2 + i + wy * 0.07) * 1.2, 0, Math.PI * 2);
        ctx.fill();
      }
      // Weisse Brecher-Kämme
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(L + 10, y + 8);
      for (let x = L + 10; x < R - 10; x += 8) {
        ctx.lineTo(x + 4, y + 8 + Math.sin(x * 0.2 + tick * 0.25 + wy * 0.03) * 3);
      }
      ctx.stroke();
    }

    // Ruhige Zone: feine Reflexionslinien.
    if (m < 0.75) {
      ctx.strokeStyle = `rgba(255,255,255,${0.22 - m * 0.1})`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(L + 24, y + 5);
      ctx.lineTo(R - 24, y + 5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(L + 40, y + 10);
      ctx.lineTo(R - 40, y + 10);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawBanks() {
  // Baut einen Ufer-Polygonpfad mit 1-Pixel-Abtastung.
  function bankPath(side, innerOffset, outerOffset, wobbleFn) {
    const mult = side === 'L' ? -1 : 1;
    ctx.beginPath();
    for (let y = 0; y <= HEIGHT; y += 1) {
      const edges = waterEdges(y + camY);
      const edge = side === 'L' ? edges[0] : edges[1];
      const x = edge + mult * innerOffset;
      if (y === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    for (let y = HEIGHT; y >= 0; y -= 1) {
      const edges = waterEdges(y + camY);
      const edge = side === 'L' ? edges[0] : edges[1];
      const wob = wobbleFn ? wobbleFn(y + camY, side) : 0;
      const x = edge + mult * (outerOffset + wob);
      ctx.lineTo(x, y);
    }
    ctx.closePath();
  }

  // Schicht 1: Dunkler Waldboden — alles ausserhalb des Wassers.
  ctx.fillStyle = '#2a5a35';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  for (let y = 0; y <= HEIGHT; y += 1) {
    const [L] = waterEdges(y + camY);
    ctx.lineTo(L, y);
  }
  ctx.lineTo(0, HEIGHT);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(WIDTH, 0);
  for (let y = 0; y <= HEIGHT; y += 1) {
    const [, R] = waterEdges(y + camY);
    ctx.lineTo(R, y);
  }
  ctx.lineTo(WIDTH, HEIGHT);
  ctx.closePath();
  ctx.fill();

  // Schicht 2: Hellere Graszone
  ctx.fillStyle = '#4a9a4a';
  const grassWobbleL = (wy) => Math.sin(wy * 0.02) * 8;
  const grassWobbleR = (wy) => Math.sin(wy * 0.023 + 1.7) * 8;
  bankPath('L', 0, 55, grassWobbleL);
  ctx.fill();
  bankPath('R', 0, 55, grassWobbleR);
  ctx.fill();

  // Übergang Gras → hellerer Farbton
  ctx.fillStyle = 'rgba(255, 230, 130, 0.15)';
  bankPath('L', 10, 35, grassWobbleL);
  ctx.fill();
  bankPath('R', 10, 35, grassWobbleR);
  ctx.fill();

  // Schicht 3: Sandige/kiesige Uferzone
  ctx.fillStyle = '#c9b284';
  const sandWobbleL = (wy) => Math.sin(wy * 0.07) * 3 + Math.sin(wy * 0.15 + 0.5) * 2;
  const sandWobbleR = (wy) => Math.sin(wy * 0.08 + 2.1) * 3 + Math.sin(wy * 0.17) * 2;
  bankPath('L', 0, 10, sandWobbleL);
  ctx.fill();
  bankPath('R', 0, 10, sandWobbleR);
  ctx.fill();

  // Schicht 4: Feuchter, dunklerer Saum direkt am Wasser
  ctx.fillStyle = 'rgba(100, 80, 55, 0.55)';
  const wetWobbleL = (wy) => Math.sin(wy * 0.12) * 1.5;
  const wetWobbleR = (wy) => Math.sin(wy * 0.13 + 1.2) * 1.5;
  bankPath('L', 0, 3, wetWobbleL);
  ctx.fill();
  bankPath('R', 0, 3, wetWobbleR);
  ctx.fill();

  // Detail: kleine Kieselsteine — an 25-px-Grid ausgerichtet, damit sie bei
  // kontinuierlichem Scroll nicht springen/flimmern.
  const pebbleStep = 25;
  const pebbleRow = Math.floor(camY / pebbleStep) * pebbleStep - pebbleStep;
  for (let wy = pebbleRow; wy < camY + HEIGHT + pebbleStep; wy += pebbleStep) {
    const screenY = wy - camY;
    if (screenY < -10 || screenY > HEIGHT + 10) continue;
    const [L, R] = waterEdges(wy);
    for (let j = 0; j < 3; j++) {
      const hashL = Math.abs(Math.sin(wy * 0.31 + j * 7.3)) % 1;
      const hashR = Math.abs(Math.sin(wy * 0.27 + j * 9.1 + 3.2)) % 1;
      const px = L - 4 - hashL * 8;
      const pxR = R + 4 + hashR * 8;
      const psize = 1 + hashL * 1.5;
      ctx.fillStyle = 'rgba(100, 85, 60, 0.6)';
      ctx.beginPath();
      ctx.arc(px, screenY, psize, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(pxR, screenY, psize, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Detail: Grasbüschel — eigenes 18-px-Grid, damit ihre Welt-Positionen
  // stabil sind und sie nicht beim Kameraschub aufblinken.
  const grassStep = 18;
  const grassRow = Math.floor(camY / grassStep) * grassStep - grassStep;
  for (let wy = grassRow; wy < camY + HEIGHT + grassStep; wy += grassStep) {
    const screenY = wy - camY;
    if (screenY < -5 || screenY > HEIGHT + 5) continue;
    const [L, R] = waterEdges(wy);
    const hashL = Math.abs(Math.sin(wy * 0.19)) % 1;
    const hashR = Math.abs(Math.sin(wy * 0.23 + 2.5)) % 1;
    if (hashL > 0.3) {
      const gx = L - 15 - hashL * 6;
      drawGrassTuft(gx, screenY);
    }
    if (hashR > 0.3) {
      const gx = R + 15 + hashR * 6;
      drawGrassTuft(gx, screenY);
    }
  }
}

function drawGrassTuft(x, y) {
  ctx.strokeStyle = '#2e7030';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x - 2, y + 2); ctx.lineTo(x - 2, y - 3);
  ctx.moveTo(x, y + 2); ctx.lineTo(x, y - 4);
  ctx.moveTo(x + 2, y + 2); ctx.lineTo(x + 2, y - 3);
  ctx.stroke();
  ctx.strokeStyle = '#4aa04a';
  ctx.beginPath();
  ctx.moveTo(x - 1, y + 2); ctx.lineTo(x - 1, y - 2);
  ctx.moveTo(x + 1, y + 2); ctx.lineTo(x + 1, y - 2);
  ctx.stroke();
}

function drawFish(fish) {
  // Als Delfin gezeichnet: streamlined, zweifarbig (oben grau-blau, unten hell),
  // mit Rückenflosse, Brustflosse und Schwanzfluke. Zentriert um (0, 0).
  const x = fish.x;
  const y = fish.y - camY;
  const scale = 0.4;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  if (player.x - fish.x < 0) ctx.scale(-1, 1);

  // Schwanz-Fluke
  ctx.fillStyle = '#2e4f68';
  ctx.strokeStyle = '#13253a';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(55, 0);
  ctx.lineTo(82, -18);
  ctx.quadraticCurveTo(72, 0, 82, 18);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Delfin-Körper mit Zwei-Ton-Gradient (oben grau-blau, unten hell)
  const bodyGrad = ctx.createLinearGradient(0, -22, 0, 22);
  bodyGrad.addColorStop(0, '#4a6e86');
  bodyGrad.addColorStop(0.45, '#7f9cae');
  bodyGrad.addColorStop(0.55, '#e8ecef');
  bodyGrad.addColorStop(1, '#c8d0d4');
  ctx.fillStyle = bodyGrad;
  ctx.strokeStyle = '#13253a';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-72, 2);                          // Schnauzenspitze
  ctx.quadraticCurveTo(-62, -10, -48, -14);    // Melone/Stirn
  ctx.quadraticCurveTo(-30, -20, -10, -20);    // Rücken vor Flosse
  ctx.quadraticCurveTo(15, -18, 35, -13);      // Rücken hinter Flosse
  ctx.quadraticCurveTo(50, -10, 58, -4);       // Schwanzansatz oben
  ctx.quadraticCurveTo(55, 0, 58, 4);          // Schwanzkerbe
  ctx.quadraticCurveTo(50, 10, 35, 13);        // Schwanzansatz unten
  ctx.quadraticCurveTo(10, 19, -20, 19);       // Bauch
  ctx.quadraticCurveTo(-50, 16, -64, 10);      // unter der Melone
  ctx.quadraticCurveTo(-72, 8, -72, 2);        // zurück zur Schnauze
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Rückenflosse (gebogen nach hinten)
  ctx.fillStyle = '#2e4f68';
  ctx.beginPath();
  ctx.moveTo(-5, -19);
  ctx.quadraticCurveTo(5, -36, 18, -18);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Brustflosse (pectoral)
  ctx.fillStyle = '#2e4f68';
  ctx.beginPath();
  ctx.moveTo(-32, 8);
  ctx.quadraticCurveTo(-30, 22, -16, 22);
  ctx.quadraticCurveTo(-20, 14, -22, 10);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Maul-Linie (Schnabel/Rostrum)
  ctx.strokeStyle = '#13253a';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-70, 6);
  ctx.quadraticCurveTo(-62, 9, -48, 7);
  ctx.stroke();

  // Zwei-Ton-Trennlinie (schwaches Highlight)
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-60, 2);
  ctx.quadraticCurveTo(-20, 4, 40, 3);
  ctx.stroke();

  // Auge
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-48, -6, 2.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-49, -7, 1, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawFisherman(fisherman) {
  const y = fisherman.y - camY;
  if (y < -200 || y > HEIGHT + 100) return;
  const [L, R] = waterEdges(fisherman.y);
  // Fischer muss IMMER ausserhalb des Wassers stehen. Mindestabstand 15 px
  // zur Uferkante; falls das Ufer so nah am Screen-Rand ist, dass der Fischer
  // zwischen Wasser und Bildschirmrand gequetscht wäre, lieber gar nicht zeichnen.
  const edgeGap = 15;
  let adjustedX;
  if (fisherman.side === 'L') {
    const desired = L - 40;
    adjustedX = Math.max(20, desired);
    if (adjustedX > L - edgeGap) return;
  } else {
    const desired = R + 40;
    adjustedX = Math.min(WIDTH - 20, desired);
    if (adjustedX < R + edgeGap) return;
  }

  // Flash-Effekt: nach Berührung für 3 Sekunden gold pulsierend.
  const flashDuration = 180;
  const isFlashing = fisherman.touched && (tick - fisherman.flashTime < flashDuration);
  const flashIntensity = isFlashing ? Math.abs(Math.sin((tick - fisherman.flashTime) * 0.15)) : 0;
  const flashOn = isFlashing && flashIntensity > 0.5;

  const scale = 0.4;
  ctx.save();
  ctx.translate(adjustedX, y);
  ctx.scale(scale, scale);
  if (fisherman.side === 'R') ctx.scale(-1, 1);

  // Beine (Hose)
  ctx.fillStyle = '#2f4a6a';
  ctx.strokeStyle = '#1a2b3f';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-18, 60); ctx.lineTo(-12, 60);
  ctx.lineTo(-28, 140); ctx.lineTo(-40, 138);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(12, 60); ctx.lineTo(18, 60);
  ctx.lineTo(32, 138); ctx.lineTo(20, 140);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Stiefel
  ctx.fillStyle = '#2a1a0f';
  ctx.beginPath(); ctx.ellipse(-34, 142, 12, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(26, 142, 12, 5, 0, 0, Math.PI * 2); ctx.fill();

  // Oberkörper (T-Shirt / Weste)
  const shirtGrad = ctx.createLinearGradient(-24, -30, 24, 60);
  shirtGrad.addColorStop(0, '#6d8f3c');
  shirtGrad.addColorStop(1, '#3c5a1e');
  ctx.fillStyle = shirtGrad;
  ctx.strokeStyle = '#28400f';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-24, -28);
  ctx.quadraticCurveTo(-28, 30, -20, 62);
  ctx.lineTo(20, 62);
  ctx.quadraticCurveTo(28, 30, 24, -28);
  ctx.quadraticCurveTo(0, -32, -24, -28);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Arme (Haut)
  ctx.fillStyle = '#e8b58a';
  ctx.strokeStyle = '#8f6238';
  ctx.lineWidth = 2;
  // linker Arm hängt
  ctx.beginPath();
  ctx.moveTo(-22, -10);
  ctx.quadraticCurveTo(-40, 10, -36, 34);
  ctx.lineTo(-28, 34);
  ctx.quadraticCurveTo(-32, 10, -14, -10);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // rechter Arm hält Rute
  ctx.beginPath();
  ctx.moveTo(14, -10);
  ctx.quadraticCurveTo(36, 4, 44, 22);
  ctx.lineTo(36, 28);
  ctx.quadraticCurveTo(30, 10, 22, -10);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Hals
  ctx.fillStyle = '#e8b58a';
  ctx.fillRect(-5, -36, 10, 10);

  // Kopf — bei Flash rot pulsierend, sonst Hautfarbe.
  if (flashOn) {
    ctx.shadowColor = '#ff2020';
    ctx.shadowBlur = 18;
    ctx.fillStyle = '#e52020';
    ctx.strokeStyle = '#7a0a0a';
  } else {
    ctx.fillStyle = '#e8b58a';
    ctx.strokeStyle = '#8f6238';
  }
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, -50, 15, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  if (flashOn) ctx.shadowBlur = 0;

  // Bart (Fischer-Charakter)
  ctx.fillStyle = '#c0c0c0';
  ctx.beginPath();
  ctx.ellipse(0, -42, 10, 6, 0, 0, Math.PI);
  ctx.fill();

  // Hut mit Krempe
  ctx.fillStyle = '#5a3b1c';
  ctx.strokeStyle = '#2e1e0a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(0, -61, 22, 4, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-12, -61);
  ctx.quadraticCurveTo(-14, -78, 0, -78);
  ctx.quadraticCurveTo(14, -78, 12, -61);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#3a2410';
  ctx.fillRect(-12, -64, 24, 2);

  if (fisherman.rodInWater) {
    // Rute ins Wasser geschwungen, mit Schnur und Schwimmer.
    const rodGrad = ctx.createLinearGradient(40, 20, 410, 80);
    rodGrad.addColorStop(0, '#6b4528');
    rodGrad.addColorStop(1, '#b88a5a');
    ctx.strokeStyle = rodGrad;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(40, 20);
    ctx.quadraticCurveTo(190, -40, 410, 80);
    ctx.stroke();

    // Angelschnur
    ctx.strokeStyle = 'rgba(80,80,80,0.85)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(410, 80);
    ctx.quadraticCurveTo(460, 160, 410, 240);
    ctx.stroke();

    // Schwimmer (Bobber)
    ctx.fillStyle = '#d63a1a';
    ctx.strokeStyle = '#3a0f04';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(410, 240, 10, 16, Math.PI / 8, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(410, 240, 10, 16, Math.PI / 8, 0, Math.PI * 2);
    ctx.clip();
    ctx.fillStyle = '#fafafa';
    ctx.fillRect(395, 240, 40, 20);
    ctx.restore();
    ctx.strokeStyle = '#2a1a0f';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(405, 225); ctx.lineTo(402, 215);
    ctx.stroke();
  } else {
    // Rute am Ufer hochgehalten / geschultert — keine Schnur im Wasser.
    const rodGrad = ctx.createLinearGradient(40, 20, 260, -220);
    rodGrad.addColorStop(0, '#6b4528');
    rodGrad.addColorStop(1, '#b88a5a');
    ctx.strokeStyle = rodGrad;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(40, 20);
    ctx.quadraticCurveTo(160, -100, 260, -220);
    ctx.stroke();
    // Aufgewickelte Schnur an der Rutenspitze
    ctx.strokeStyle = 'rgba(80,80,80,0.7)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
      ctx.moveTo(260, -220 + i * 3);
      ctx.lineTo(275, -218 + i * 3);
    }
    ctx.stroke();
  }

  ctx.restore();
}

function drawPoliceBoat(boat) {
  const x = boat.x;
  const yWater = boat.y - camY;
  const jumpOff = boat.jumpOffset || 0;
  const y = yWater - jumpOff;  // hebt das Boot beim Sprung nach oben auf dem Bildschirm

  // Wasserschatten bleibt unten, wächst flacher wenn das Boot fliegt
  if (jumpOff > 0.5) {
    ctx.save();
    const shrink = 1 - Math.min(0.55, jumpOff / 70);
    ctx.fillStyle = `rgba(0,0,0,${0.28 * shrink})`;
    ctx.beginPath();
    ctx.ellipse(x, yWater + 16, 40 * shrink, 6 * shrink, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(0.6, 0.6);
  // Leichter Neigungswinkel während der Flugphase (nach vorne/hinten kippen).
  if (jumpOff > 0.5 && boat.jumpState === 3) {
    const phase = Math.min(1, (boat.jumpTimer || 0) / 22);
    ctx.rotate((0.5 - phase) * 0.35);
  }

  // Bugwelle (vorn) — Boot bewegt sich in -y (downstream), also V nach unten/oben?
  // vy ist negativ (bewegt sich in -y World = nach oben auf Screen). Bugwelle entsteht
  // also am oberen Ende (Spitze, die die Welle "aufwirft").
  const waveT = tick * 0.12;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.ellipse(0, -42 + Math.sin(waveT) * 1.5, 34, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath();
  ctx.ellipse(-18, -38 + Math.sin(waveT + 1) * 1.2, 12, 4, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(18, -38 + Math.sin(waveT + 2) * 1.2, 12, 4, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Schatten unterm Rumpf
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath();
  ctx.ellipse(2, 32, 66, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Rumpf — Motorboot-Silhouette mit Bug vorne (oben)
  const hullGrad = ctx.createLinearGradient(0, -30, 0, 30);
  hullGrad.addColorStop(0, '#f3f4f6');
  hullGrad.addColorStop(0.45, '#d8dce2');
  hullGrad.addColorStop(1, '#8a95a3');
  ctx.fillStyle = hullGrad;
  ctx.strokeStyle = '#1b1f26';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  // Umriss von oben-Mitte (Bug) im Uhrzeigersinn
  ctx.moveTo(0, -38);
  ctx.quadraticCurveTo(40, -30, 58, 0);
  ctx.quadraticCurveTo(60, 22, 44, 28);
  ctx.lineTo(-44, 28);
  ctx.quadraticCurveTo(-60, 22, -58, 0);
  ctx.quadraticCurveTo(-40, -30, 0, -38);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Blaues Streifen-Band (Polizei-Identität) über die Länge
  ctx.fillStyle = '#1e6fd9';
  ctx.beginPath();
  ctx.moveTo(-54, -2);
  ctx.quadraticCurveTo(-40, -18, 0, -22);
  ctx.quadraticCurveTo(40, -18, 54, -2);
  ctx.lineTo(54, 6);
  ctx.quadraticCurveTo(40, -10, 0, -14);
  ctx.quadraticCurveTo(-40, -10, -54, 6);
  ctx.closePath();
  ctx.fill();
  // Dünner gelber Strich unter dem Band
  ctx.strokeStyle = '#ffd24a';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-54, 7);
  ctx.quadraticCurveTo(-40, -9, 0, -13);
  ctx.quadraticCurveTo(40, -9, 54, 7);
  ctx.stroke();

  // Schriftzug POLICIJA (slowenisch) — gross & hochkontrastig.
  // Box darf über den Rumpf hinausragen, sitzt oberhalb der Kabine.
  // KEIN strokeText — der dicke Stroke verschwimmt durch die 0.6-Skalierung
  // mit dem Fill zu einem schwarzen Klumpen; Arial Black ist schon 900.
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(-86, -28, 172, 32);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.strokeRect(-86, -28, 172, 32);
  ctx.font = '900 28px "Arial Black", Impact, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#000';
  ctx.fillText('POLICIJA', 0, -12);
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  // Steuerhaus (Kabine) in der Mitte
  const cabGrad = ctx.createLinearGradient(0, 4, 0, 24);
  cabGrad.addColorStop(0, '#2a3240');
  cabGrad.addColorStop(1, '#141820');
  ctx.fillStyle = cabGrad;
  ctx.strokeStyle = '#0b0e13';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-24, 22);
  ctx.lineTo(-20, 4);
  ctx.lineTo(20, 4);
  ctx.lineTo(24, 22);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Fenster
  ctx.fillStyle = 'rgba(160, 210, 240, 0.75)';
  ctx.fillRect(-16, 8, 32, 8);
  ctx.strokeStyle = '#0b0e13';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, 8); ctx.lineTo(0, 16);
  ctx.stroke();

  // Blinklicht-Balken auf dem Dach
  ctx.fillStyle = '#1b1f26';
  ctx.fillRect(-16, -2, 32, 6);
  const phase = boat.blinkPhase;
  const leftOn = Math.floor(phase / 10) % 2 === 0;
  const L_col = leftOn ? '#2b8bff' : '#3a1f1f';
  const R_col = leftOn ? '#4a1f1f' : '#ff3030';
  // Glow-Halo (nur aktive Seite)
  if (leftOn) {
    const g = ctx.createRadialGradient(-9, 1, 1, -9, 1, 22);
    g.addColorStop(0, 'rgba(80, 160, 255, 0.7)');
    g.addColorStop(1, 'rgba(80, 160, 255, 0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(-9, 1, 22, 0, Math.PI * 2); ctx.fill();
  } else {
    const g = ctx.createRadialGradient(9, 1, 1, 9, 1, 22);
    g.addColorStop(0, 'rgba(255, 70, 70, 0.7)');
    g.addColorStop(1, 'rgba(255, 70, 70, 0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(9, 1, 22, 0, Math.PI * 2); ctx.fill();
  }
  // Linsen
  ctx.fillStyle = L_col;
  ctx.beginPath(); ctx.ellipse(-9, 1, 6, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = R_col;
  ctx.beginPath(); ctx.ellipse(9, 1, 6, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#0b0e13';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(-9, 1, 6, 3, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(9, 1, 6, 3, 0, 0, Math.PI * 2); ctx.stroke();

  // Kleine Deck-Details
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-48, 20); ctx.lineTo(48, 20);
  ctx.stroke();

  // Pollerchen am Heck
  ctx.fillStyle = '#262a33';
  ctx.fillRect(-30, 26, 4, 4);
  ctx.fillRect(26, 26, 4, 4);

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, WIDTH, HEIGHT);

  const skyGrad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
  skyGrad.addColorStop(0, '#87CEEB');
  skyGrad.addColorStop(0.6, '#A8D8E8');
  skyGrad.addColorStop(1, '#B8E2EC');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  drawBanks();
  drawWater();
  drawWaves();

  obstacles.forEach(o => o.type === 'rock' ? drawRock(o) : drawLog(o));
  collectibles.forEach(item => {
    if (item.type === 'banana') drawBanana(item);
    else if (item.type === 'riegel') drawRiegel(item);
  });
  fishes.forEach(drawFish);
  policeBoats.forEach(drawPoliceBoat);

  // Bäume VOR Kajak/Personen zeichnen, damit sie die Strand-Szene nicht verdecken.
  trees.forEach(drawTree);
  drawKayak();
  drawSplashes();
  fishermen.forEach(drawFisherman);
  drawScorePops();
  drawHUD();
}

// Fixed-Timestep-Loop: update() läuft fix bei 60 Hz, unabhängig von der
// Display-Refresh-Rate (60/120/144 Hz). So läuft das Spiel überall gleich schnell.
const FIXED_DT = 1000 / 60;
let _loopLastTime = 0;
let _loopAcc = 0;
let _loopError = null;
function loop(now) {
  if (!_loopLastTime) _loopLastTime = now || performance.now();
  const t = now || performance.now();
  const delta = Math.min(250, t - _loopLastTime);
  _loopLastTime = t;
  _loopAcc += delta;
  // Maximal 5 update()-Ticks pro Frame, verhindert "spiral of death" bei Lag.
  try {
    let steps = 0;
    while (_loopAcc >= FIXED_DT && steps < 5) {
      update();
      _loopAcc -= FIXED_DT;
      steps++;
    }
    if (_loopAcc > FIXED_DT * 5) _loopAcc = 0;
    draw();
  } catch (err) {
    _loopError = err;
    // Notfall-Rendering: Fehler sichtbar machen statt schwarzem Bildschirm.
    try {
      ctx.fillStyle = '#222';
      ctx.fillRect(0, 0, WIDTH || 390, HEIGHT || 600);
      ctx.fillStyle = '#ff6a4a';
      ctx.font = 'bold 16px Arial';
      ctx.textAlign = 'left';
      ctx.fillText('Fehler in der Schleife:', 20, 40);
      ctx.fillStyle = '#fff';
      ctx.font = '12px monospace';
      const msg = String(err && err.stack || err).split('\n').slice(0, 12);
      msg.forEach((line, i) => ctx.fillText(line.slice(0, 60), 20, 70 + i * 16));
    } catch (_) {}
    console.error('Game loop error:', err);
  }
  requestAnimationFrame(loop);
}
